name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write   # задължително за OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest   # OIDC иска скорошен npm
      - run: npm ci
      - run: npm run build
      - run: npm publish                 # без токен — OIDC се грижи
